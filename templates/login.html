<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WISE Statutory</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #0f172a; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #475569; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        .error { color: #ef4444; text-align: center; margin-bottom: 15px; font-size: 14px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #64748b; font-size: 14px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Admin Access</h2>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required autofocus>
            </div>
            <button type="submit">Sign In</button>
        </form>
        <a href="{{ url_for('index') }}" class="back-link">← Back to Portal</a>
    </div>
</body>
</html>
